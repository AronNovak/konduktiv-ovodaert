          field_body:
            -
              value: '<p>A Konduktív Óvodáért Alapítvány 2009 márciusában jött létre azzal a céllal, hogy támogassa a mai Semmelweis Egyetem Pető András Gyakorló Óvodájának működését. Munkánk középpontjában a konduktív pedagógia áll: olyan fejlesztési módszer, amely a mozgásukban akadályozott gyermekek aktív részvételére, önálló cselekvésére épít.</p><p>Tevékenységünk fókusza a mindennapi óvodai munkához szükséges fejlesztő eszközök, játékok beszerzése, illetve olyan kezdeményezések támogatása, amelyek a gyermekek életminőségét és a szülők lehetőségeit bővítik.</p>'
              format: basic_html
          field_title:
            -
              value: 'Az Alapítvány'
