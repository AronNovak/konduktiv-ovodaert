          field_body:
            -
              value: '<p>Alapítványunk a <strong>Semmelweis Egyetem Pető András Gyakorló Óvodája</strong> mellett működik. Az itt fejlesztett gyermekek mozgásukban akadályozottak — a konduktív pedagógia segítségével kapnak lehetőséget arra, hogy minél önállóbban, magabiztosan éljék mindennapjaikat.</p><p>Munkánk középpontjában az áll, hogy a konduktív pedagógiai munkához szükséges fejlesztő eszközöket, játékokat és segédeszközöket biztosítsuk. Emellett olyan kezdeményezéseket támogatunk, amelyek a gyermekek életminőségét és a családok lehetőségeit javítják — a szenzoros eszközkölcsönzéstől a rehabilitációs gyermekkocsikon át a jótékonysági rendezvényekig.</p>'
              format: basic_html
